<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureTask — Connexion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon-lg">🔐</div>
      <div class="logo-title">Secure<span>Task</span></div>
      <div class="logo-sub">Plateforme de gestion SSI</div>
    </div>

    <div id="login-error" class="login-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
        <input type="email" id="email" class="form-control" placeholder="vous@securetask.ma" value="test@securetask.ma" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" value="password123" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
        🔓 Se connecter
      </button>
    </form>

    <div class="login-links" style="margin-top:20px;">
      <a href="#">Mot de passe oublié ?</a>
      <a href="#">Créer un compte</a>
    </div>

    <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);text-align:center;">
      <p style="font-size:12px;color:var(--text-3);">Demo : <code style="background:var(--surface2);padding:2px 6px;border-radius:4px;">test@securetask.ma</code> / <code style="background:var(--surface2);padding:2px 6px;border-radius:4px;">password123</code></p>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="main.js"></script>
</body>
</html>
